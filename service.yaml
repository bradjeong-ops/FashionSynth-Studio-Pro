apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: fashionsynth-studio
  labels:
    cloud.googleapis.com/location: asia-northeast3
spec:
  template:
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
      - image: gcr.io/PROJECT_ID/fashionsynth-studio
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi